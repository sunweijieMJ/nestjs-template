# 构建与部署工作流
# 构建 Docker 镜像并推送到 GHCR，通过 SSH 部署到阿里云 ECS
#
# 触发条件:
#   1. Check 工作流在 main/master 分支成功后自动触发
#   2. tag 推送 (v* 格式)
#   3. 手动触发 (workflow_dispatch，可选择是否部署)
#
# 配置步骤:
#   在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加:
#     - ALIYUN_HOST: 服务器 IP 或域名
#     - ALIYUN_PORT: SSH 端口 (默认 22)
#     - ALIYUN_USER: SSH 用户名
#     - ALIYUN_SSH_KEY: SSH 私钥 (完整内容)
#     - ALIYUN_DEPLOY_PATH: 部署目标路径

name: Deploy

on:
  workflow_run:
    workflows: [Check]
    branches: [main, master, 'release/**']
    types: [completed]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deploy:
        description: '是否部署到服务器'
        required: true
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nestjs-template

jobs:
  # ==================== 构建并推送镜像 ====================
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      git_hash: ${{ steps.info.outputs.git_hash }}
      build_time: ${{ steps.info.outputs.build_time }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build info
        id: info
        run: |
          echo "git_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: repo
        run: echo "image_name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image_name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          target: production
          build-args: DB_TYPE=relational
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到阿里云 ECS ====================
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    permissions:
      packages: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Check deploy secrets
        run: |
          has_error=0
          if [[ -z "${{ secrets.ALIYUN_HOST }}" ]]; then
            echo "::error::缺少 ALIYUN_HOST secret"
            has_error=1
          fi
          if [[ -z "${{ secrets.ALIYUN_USER }}" ]]; then
            echo "::error::缺少 ALIYUN_USER secret"
            has_error=1
          fi
          if [[ -z "${{ secrets.ALIYUN_SSH_KEY }}" ]]; then
            echo "::error::缺少 ALIYUN_SSH_KEY secret"
            has_error=1
          fi
          if [[ -z "${{ secrets.ALIYUN_DEPLOY_PATH }}" ]]; then
            echo "::error::缺少 ALIYUN_DEPLOY_PATH secret"
            has_error=1
          fi
          if [[ $has_error -eq 1 ]]; then
            echo "请在 Settings -> Secrets and variables -> Actions 中配置以上 secrets"
            exit 1
          fi
          echo "Secrets 配置检查通过"

      - name: Sync deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "docker/docker-compose.ecs.yaml,deploy/manage.sh"
          target: ${{ secrets.ALIYUN_DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_FULL_NAME: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.git_hash }}
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN,IMAGE_FULL_NAME
          script: |
            set -e

            cd "$DEPLOY_PATH"

            # 确保 manage.sh 可执行
            chmod +x deploy/manage.sh

            echo "Logging in to GitHub Container Registry..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            echo "Pulling image: ${IMAGE_FULL_NAME}..."
            IMAGE_FULL_NAME="${IMAGE_FULL_NAME,,}"

            retry=0
            max_retries=3
            until docker pull "${IMAGE_FULL_NAME}" || [ $retry -eq $max_retries ]; do
              retry=$((retry + 1))
              echo "  Retry $retry/$max_retries for ${IMAGE_FULL_NAME}..."
              sleep 10
            done

            if [ $retry -eq $max_retries ]; then
              echo "Failed to pull image after $max_retries attempts"
              exit 1
            fi
            echo "Image pulled successfully"

            export IMAGE_FULL_NAME

            echo "Restarting services..."
            docker compose -f docker/docker-compose.ecs.yaml up -d --remove-orphans

            # 等待服务启动并检查健康状态
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if docker compose -f docker/docker-compose.ecs.yaml exec -T api wget -q --spider http://localhost:3000/api/v1/health/ready 2>/dev/null; then
                echo "API is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "API health check failed after 30 attempts"
                docker compose -f docker/docker-compose.ecs.yaml logs api --tail=50
                exit 1
              fi
              echo "  Attempt $i/30..."
              sleep 5
            done

            # 清理旧镜像（保留最新的 3 个，docker images 默认按创建时间倒序排列）
            echo "Cleaning up old images..."
            IMAGE_REPO="${IMAGE_FULL_NAME%:*}"
            docker images "${IMAGE_REPO}" -q | tail -n +4 | xargs -r docker rmi -f || true

            echo "Deployment completed!"
            echo "Deployed image: ${IMAGE_FULL_NAME}"

  # ==================== 部署结果通知 ====================
  notify:
    name: Notify
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Deployment summary
        run: |
          {
            echo "# 部署结果"
            echo ""
            echo "| 阶段 | 状态 |"
            echo "|------|------|"
            echo "| 构建推送 | ${{ needs.build-and-push.result }} |"
            echo "| 部署 | ${{ needs.deploy.result || 'skipped' }} |"
            echo ""
            echo "**Git Hash**: \`${{ needs.build-and-push.outputs.git_hash }}\`"
            echo "**构建时间**: ${{ needs.build-and-push.outputs.build_time }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> 部署失败，请检查日志排查问题" >> "$GITHUB_STEP_SUMMARY"
          fi
